services:
  - type: web
    name: be-a-banker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        value: sqlite:////app/data/banker.db
    disk:
      name: banker-db
      mountPath: /app/data
      sizeGB: 1