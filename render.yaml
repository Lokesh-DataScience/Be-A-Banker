services:
  - type: web
    name: be-a-banker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/banker.db
      - key: SUPABASE_JWT_SECRET
        sync: false   # set manually in Render dashboard
    disk:
      name: banker-db
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: be-a-banker-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://be-a-banker-api.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false   # set manually in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false   # set manually in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html